<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英语点读大冒险</title>
<style>
body { margin:0; padding:20px; font-family:'Comic Sans MS', 'PingFang SC', sans-serif; background:#eef2f9; }
.app { max-width:1200px; margin:0 auto; }

/* 顶部少儿风格导航栏 */
.top-nav {
    display: flex; justify-content: space-between; align-items: center;
    background: #ffffff; padding: 15px 30px; border-radius: 25px;
    box-shadow: 0 10px 30px rgba(107, 99, 255, 0.1); margin-bottom: 25px;
}
.nav-logo { display: flex; align-items: center; gap: 15px; }
.mascot-icon { font-size: 38px; background: #f0f4f8; padding: 10px; border-radius: 20px; }
.nav-titles h1 { margin: 0; font-size: 24px; color: #2c3e50; font-weight: 900; letter-spacing: 1px; }
.nav-titles p { margin: 5px 0 0 0; font-size: 14px; color: #8e9eab; font-weight: bold; }

.nav-center .page-badge {
    background: linear-gradient(135deg, #6b63ff, #8c86ff); color: white;
    padding: 10px 25px; border-radius: 99px; font-size: 18px; font-weight: 900;
    box-shadow: 0 6px 15px rgba(107, 99, 255, 0.3);
}

.nav-stats .stat-pill {
    background: #fff8e1; border: 2px solid #ffeaa7; color: #d35400;
    padding: 10px 20px; border-radius: 99px; font-size: 16px; font-weight: bold;
    display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 10px rgba(255, 234, 167, 0.5);
}

/* 书本容器 */
.book-wrap { position:relative; background:#fff; border-radius:24px; box-shadow:0 15px 40px rgba(0,0,0,0.08); padding:15px; }
.book-container { position:relative; width:100%; border-radius:15px; overflow:hidden; }
.bg-image { width:100%; height:auto; display:block; pointer-events:none; }
.svg-overlay { position:absolute; inset:0; width:100%; height:100%; z-index:2; }

/* 热区高亮样式 */
polygon { fill:transparent; stroke:transparent; cursor:pointer; pointer-events:all; transition:all 0.2s; }
polygon:hover { fill:rgba(255,210,82,.3); stroke:#f5b81d; stroke-width:3px; }
polygon.clicked-flash { fill:rgba(84,222,151,.6)!important; stroke:#28b463!important; transition:none; }

/* 核心修复：极致 Q弹动画与防遮挡定位 */
@keyframes popBouncing {
    0% { opacity:0; transform: translateY(15px); }
    50% { opacity:1; transform: translateY(-8px); }
    75% { opacity:1; transform: translateY(3px); }
    100% { opacity:1; transform: translateY(0); }
}

.smart-tooltip {
    position:absolute; z-index:10; pointer-events:none; opacity:0; text-align:center;
}
.smart-tooltip.active {
    animation: popBouncing 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
}

/* 主题预设 */
.theme-bubble { background: linear-gradient(135deg, #e0ffff, #ffffff); border: 4px solid #00ced1; border-radius: 30px; box-shadow: 0 8px 25px rgba(0, 206, 209, 0.3); padding: 15px 25px; }
.theme-bubble .word-eng { font-size: 28px; font-weight: 900; color: #008b8b; margin: 0; }
.theme-bubble .word-chi { font-size: 18px; font-weight: bold; color: #008080; margin-top:2px; }
.theme-bubble .action-hint { font-size: 16px; color: #20b2aa; font-weight: bold; margin-top:8px; background:#ccfafa; padding:4px 12px; border-radius:12px; display:inline-block; }

.theme-candy { background: linear-gradient(135deg, #fff4fb, #fffef8); border: 4px dashed #ff69b4; border-radius: 25px; box-shadow: 0 8px 25px rgba(255,105,180,0.3); padding: 15px 25px; }
.theme-candy .word-eng { font-size: 28px; font-weight: 900; color: #c71585; margin: 0; }
.theme-candy .word-chi { font-size: 18px; font-weight: bold; color: #ff1493; margin-top:2px; }
.theme-candy .action-hint { font-size: 16px; color: #db7093; font-weight: bold; margin-top:8px; background:#ffe6f2; padding:4px 12px; border-radius:12px; display:inline-block; }

.theme-forest { background: #e8f5e9; border: 5px solid #4caf50; border-radius: 20px 20px 5px 20px; box-shadow: 4px 6px 0px #2e7d32; padding: 15px 25px; }
.theme-forest .word-eng { font-size: 28px; font-weight: 900; color: #1b5e20; margin: 0; }
.theme-forest .word-chi { font-size: 18px; font-weight: bold; color: #2e7d32; margin-top:2px; }
.theme-forest .action-hint { font-size: 16px; color: #ffffff; font-weight: bold; margin-top:8px; background:#4caf50; padding:4px 12px; border-radius:12px; display:inline-block; }

/* 底部控制器 */
.controls { display:flex; gap:12px; flex-wrap:wrap; margin-top:20px; background:#fff; padding:18px 25px; border-radius:25px; box-shadow:0 8px 25px rgba(0,0,0,0.05); align-items:center; justify-content:center;}
.nav-btn { border:none; background:#6b63ff; color:#fff; font-size:18px; font-weight:bold; padding:12px 25px; border-radius:15px; cursor:pointer; transition: transform 0.1s; }
.nav-btn:hover { transform: scale(1.05); background:#5046e5; }
.setting-box { background:#f4f6f9; border-radius:15px; padding:10px 18px; font-size: 16px; font-weight:bold; color:#444; border:2px solid #e1e5ee; }
.setting-box select { border:none; background:transparent; font-size:16px; font-weight:900; outline:none; color:#6b63ff; cursor:pointer; margin-left: 5px; }
</style>
</head>

</div>

const pageList = ["1.jpg", "2.jpg", "3.jpg", "The Usborne First Thousand Words in English_07.jpg", "The Usborne First Thousand Words in English_08.jpg", "The Usborne First Thousand Words in English_09.jpg", "The Usborne First Thousand Words in English_10.jpg", "The Usborne First Thousand Words in English_11.jpg", "The Usborne First Thousand Words in English_12.jpg", "The Usborne First Thousand Words in English_13.jpg", "The Usborne First Thousand Words in English_14.jpg", "The Usborne First Thousand Words in English_15.jpg", "The Usborne First Thousand Words in English_16.jpg", "The Usborne First Thousand Words in English_17.jpg", "The Usborne First Thousand Words in English_18.jpg", "The Usborne First Thousand Words in English_19.jpg", "The Usborne First Thousand Words in English_20.jpg", "The Usborne First Thousand Words in English_21.jpg", "The Usborne First Thousand Words in English_22.jpg", "The Usborne First Thousand Words in English_23.jpg", "The Usborne First Thousand Words in English_24.jpg", "The Usborne First Thousand Words in English_25.jpg", "The Usborne First Thousand Words in English_26.jpg", "The Usborne First Thousand Words in English_27.jpg", "The Usborne First Thousand Words in English_28.jpg", "The Usborne First Thousand Words in English_29.jpg"];
const elements = {
    img: document.getElementById('page-image'),
    svg: document.getElementById('svg-layer'),
    prevBtn: document.getElementById('btn-prev'),
    nextBtn: document.getElementById('btn-next'),
    tooltip: document.getElementById('tooltip'),
    ttEng: document.getElementById('tt-eng'),
    ttChi: document.getElementById('tt-chi'),
    ttHint: document.getElementById('tt-hint'),
    container: document.getElementById('book-container'),
    voiceSelect: document.getElementById('voice-select'),
    themeSelect: document.getElementById('theme-select'),
    topPageBadge: document.getElementById('top-page-badge'),
    scoreText: document.getElementById('score-text')
};

let currentPageIdx = 0;
let currentAudio = null;
let currentVoiceRole = elements.voiceSelect.value;
const audioCache = {};
const learnedWords = new Set();

elements.voiceSelect.addEventListener('change', e => currentVoiceRole = e.target.value);
elements.themeSelect.addEventListener('change', e => elements.tooltip.className = 'smart-tooltip ' + e.target.value);

// 核心修复：图片加载完后，动态将SVG坐标系完美绑定到图片的自然真实分辨率，解决错位问题
elements.img.onload = () => {
    elements.svg.setAttribute('viewBox', `0 0 ${elements.img.naturalWidth} ${elements.img.naturalHeight}`);
    elements.svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');
};

function playAudio(item) {
    let audioSrc = "";
    if (typeof item.audio === 'string') audioSrc = item.audio;
    else if (item.audio && typeof item.audio === 'object') audioSrc = item.audio[currentVoiceRole] || Object.values(item.audio)[0];
    if (!audioSrc) return;
    if (!audioCache[audioSrc]) audioCache[audioSrc] = new Audio(audioSrc);
    if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
    currentAudio = audioCache[audioSrc];
    currentAudio.play().catch(e => console.log('音频播放被拦截'));
}

function bindPolygonEvents(poly, item) {
    const showTooltip = () => {
        elements.ttEng.textContent = item.english;
        elements.ttChi.textContent = item.chinese;
        elements.ttHint.textContent = item.phonetic ? ('🔊 ' + item.phonetic) : '🔊 点击发音';
        
        // 重置动画
        elements.tooltip.classList.remove('active'); 
        void elements.tooltip.offsetWidth; 
        elements.tooltip.classList.add('active');

        const bbox = poly.getBoundingClientRect();
        const containerRect = elements.container.getBoundingClientRect();
        const ttRect = elements.tooltip.getBoundingClientRect();

        // 终极越界计算算法 (绝对左上角定位，摒弃 transform X偏移)
        let targetX = bbox.left - containerRect.left + (bbox.width / 2) - (ttRect.width / 2);
        let targetY = bbox.top - containerRect.top - ttRect.height - 15;

        // Y轴：如果顶部空间不足，翻转到物体下方
        if (targetY < 10) targetY = bbox.bottom - containerRect.top + 15;
        
        // X轴：严格限制在容器内
        if (targetX < 15) targetX = 15;
        if (targetX + ttRect.width > containerRect.width - 15) targetX = containerRect.width - ttRect.width - 15;

        elements.tooltip.style.left = targetX + 'px';
        elements.tooltip.style.top = targetY + 'px';
    };

    poly.addEventListener('mouseenter', showTooltip);
    poly.addEventListener('mouseleave', () => elements.tooltip.classList.remove('active'));
    
    const clickHandler = (e) => {
        e.preventDefault();
        
        // 更新点亮数量
        learnedWords.add(item.english);
        elements.scoreText.textContent = `已点亮 ${learnedWords.size} 个词`;
        
        poly.classList.add('clicked-flash');
        setTimeout(() => poly.classList.remove('clicked-flash'), 300);
        showTooltip();
        playAudio(item);
    };
    poly.addEventListener('click', clickHandler);
    poly.addEventListener('touchstart', clickHandler, {passive:false});
}

function renderPage(idx) {
    currentPageIdx = idx;
    const filename = pageList[idx];
    elements.img.src = `pages/${filename}`;
    elements.prevBtn.disabled = idx === 0;
    elements.nextBtn.disabled = idx === pageList.length - 1;
    elements.topPageBadge.textContent = `第 ${idx + 1} 关 / 共 ${pageList.length} 关`;
    
    elements.tooltip.classList.remove('active');
    elements.svg.innerHTML = '';
    
    const items = bookData[filename] || [];
    items.forEach((item) => {
        const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
        poly.setAttribute('points', item.polygon.map(p => p.join(',')).join(' '));
        bindPolygonEvents(poly, item);
        elements.svg.appendChild(poly);
    });
}

elements.prevBtn.addEventListener('click', () => { if (currentPageIdx > 0) renderPage(currentPageIdx - 1); });
elements.nextBtn.addEventListener('click', () => { if (currentPageIdx < pageList.length - 1) renderPage(currentPageIdx + 1); });

if (pageList.length > 0) renderPage(0);
</script>
