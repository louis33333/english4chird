<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Interactive English Book</title>
<style>
    body {
        margin: 0; padding: 20px 0; font-family: 'Comic Sans MS', 'Segoe UI', system-ui, sans-serif;
        background-color: #d1d8e0; display: flex; flex-direction: column; align-items: center; user-select: none;
    }
    .book-container {
        position: relative; max-width: 1100px; width: 95%; background: #fff; box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        border-radius: 8px 16px 16px 8px; overflow: hidden; border-left: 10px solid #a5b1c2;
    }
    .bg-image { width: 100%; height: auto; display: block; pointer-events: none; }
    .svg-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; }
    polygon { fill: transparent; stroke: transparent; cursor: pointer; pointer-events: all; transition: fill 0.3s, stroke 0.3s; }
    polygon:hover { fill: rgba(255, 204, 0, 0.3); stroke: #f39c12; stroke-width: 3px; }
    polygon.clicked-flash { fill: rgba(46, 204, 113, 0.6) !important; stroke: #27ae60 !important; transition: none; }
    
    .smart-tooltip {
        position: absolute; pointer-events: none; opacity: 0;
        z-index: 10; text-align: center;
        transition: opacity 0.2s ease;
    }
    .smart-tooltip.active { opacity: 1; }

    /* 样式重构：删除了多余的行，将 action-hint 定位为音标行 */
    .theme-bubble { background: rgba(224, 255, 255, 0.95); border: 3px solid #00ced1; border-radius: 30px; padding: 12px 25px; box-shadow: 0 5px 15px rgba(0, 206, 209, 0.4); }
    .theme-bubble .word-eng { font-size: 26px; font-weight: 900; color: #008b8b; margin: 0; }
    .theme-bubble .word-chi { font-size: 18px; font-weight: bold; color: #008080; margin-top: 2px; }
    .theme-bubble .action-hint { font-size: 16px; color: #20b2aa; font-family: Arial, sans-serif; margin-top: 8px; font-weight: bold; }

    .theme-wood { background: #deb887; border: 4px solid #8b4513; border-radius: 12px; padding: 12px 25px; box-shadow: 4px 4px 0px #8b4513; }
    .theme-wood .word-eng { font-size: 26px; font-weight: 900; color: #4e2b0c; margin: 0; }
    .theme-wood .word-chi { font-size: 18px; font-weight: bold; color: #5c3317; margin-top: 2px; }
    .theme-wood .action-hint { font-size: 16px; color: #8b4513; font-family: Arial, sans-serif; margin-top: 8px; font-weight: bold; }

    .theme-candy { background: linear-gradient(135deg, #fff0f5, #ffffe0); border: 3px dashed #ff69b4; border-radius: 20px; padding: 12px 25px; box-shadow: 0 8px 15px rgba(255,105,180,0.3); }
    .theme-candy .word-eng { font-size: 26px; font-weight: 900; color: #c71585; margin: 0; }
    .theme-candy .word-chi { font-size: 18px; font-weight: bold; color: #ff1493; margin-top: 2px; }
    .theme-candy .action-hint { font-size: 16px; color: #db7093; font-family: Arial, sans-serif; margin-top: 8px; font-weight: bold; }

    .nav-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; width: 95%; max-width: 1100px; margin-top: 20px; padding: 15px; background: #fff; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); box-sizing: border-box; gap: 10px; }
    .nav-btn { background: #3498db; color: white; border: none; padding: 12px 25px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
    .nav-btn:hover { background: #2980b9; }
    .nav-btn:disabled { background: #bdc3c7; cursor: not-allowed; }
    .setting-box { display: flex; align-items: center; background: #f4f6f7; padding: 6px 12px; border-radius: 8px; border: 1px solid #dcdde1; gap: 5px;}
    .setting-box label { font-size: 15px; font-weight: bold; color: #2c3e50; }
    .setting-box select { font-size: 15px; padding: 4px; border-radius: 6px; border: 1px solid #3498db; outline: none; cursor: pointer; font-weight: bold; color: #e67e22; }
    .controls-center { display: flex; gap: 15px; }
</style>
</head>

    const pageList = ["1.jpg", "2.jpg", "The Usborne First Thousand Words in English_06.jpg", "The Usborne First Thousand Words in English_07.jpg", "The Usborne First Thousand Words in English_08.jpg", "The Usborne First Thousand Words in English_09.jpg", "The Usborne First Thousand Words in English_10.jpg", "The Usborne First Thousand Words in English_11.jpg", "The Usborne First Thousand Words in English_12.jpg", "The Usborne First Thousand Words in English_13.jpg", "The Usborne First Thousand Words in English_14.jpg", "The Usborne First Thousand Words in English_15.jpg", "The Usborne First Thousand Words in English_16.jpg", "The Usborne First Thousand Words in English_17.jpg", "The Usborne First Thousand Words in English_18.jpg", "The Usborne First Thousand Words in English_19.jpg", "The Usborne First Thousand Words in English_20.jpg", "The Usborne First Thousand Words in English_21.jpg", "The Usborne First Thousand Words in English_22.jpg", "The Usborne First Thousand Words in English_23.jpg", "The Usborne First Thousand Words in English_24.jpg", "The Usborne First Thousand Words in English_25.jpg", "The Usborne First Thousand Words in English_26.jpg", "The Usborne First Thousand Words in English_27.jpg", "The Usborne First Thousand Words in English_28.jpg", "The Usborne First Thousand Words in English_29.jpg"];
    
    const elements = {
        img: document.getElementById('page-image'),
        svg: document.getElementById('svg-layer'),
        prevBtn: document.getElementById('btn-prev'),
        nextBtn: document.getElementById('btn-next'),
        tooltip: document.getElementById('tooltip'),
        ttEng: document.getElementById('tt-eng'),
        ttChi: document.getElementById('tt-chi'),
        ttHint: document.getElementById('tt-hint'),
        container: document.getElementById('book-container'),
        voiceSelect: document.getElementById('voice-select'),
        themeSelect: document.getElementById('theme-select')
    };

    let currentPageIdx = 0;
    let currentAudio = null;
    let currentVoiceRole = elements.voiceSelect.value;
    const audioCache = {}; 

    elements.voiceSelect.addEventListener('change', (e) => currentVoiceRole = e.target.value);
    elements.themeSelect.addEventListener('change', (e) => {
        elements.tooltip.className = 'smart-tooltip ' + e.target.value;
    });

    function renderPage(idx) {
        currentPageIdx = idx;
        const filename = pageList[idx];
        
        elements.img.src = `pages/${filename}`;
        elements.prevBtn.disabled = (idx === 0);
        elements.nextBtn.disabled = (idx === pageList.length - 1);
        
        elements.tooltip.classList.remove('active');
        elements.svg.innerHTML = ''; 
        
        const items = bookData[filename] || [];
        
        items.forEach(item => {
            const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
            const pointsStr = item.polygon.map(p => `${p[0]},${p[1]}`).join(' ');
            poly.setAttribute('points', pointsStr);
            bindPolygonEvents(poly, item);
            elements.svg.appendChild(poly);
        });
    }

    function bindPolygonEvents(poly, item) {
        const showTooltip = () => {
            elements.ttEng.textContent = item.english;
            elements.ttChi.textContent = item.chinese;
            
            // 【核心逻辑：音标替换提示词】
            if (item.phonetic && item.phonetic.trim() !== '') {
                elements.ttHint.textContent = '🔊 ' + item.phonetic;
            } else {
                elements.ttHint.textContent = '👉 点击播放发音';
            }
            
            elements.tooltip.classList.add('active');
            
            const bbox = poly.getBoundingClientRect();
            const containerRect = elements.container.getBoundingClientRect();
            const ttRect = elements.tooltip.getBoundingClientRect(); 
            
            let targetX = bbox.left - containerRect.left + (bbox.width / 2) - (ttRect.width / 2);
            let targetY = bbox.top - containerRect.top - ttRect.height - 15;

            if (targetY < 10) targetY = bbox.bottom - containerRect.top + 15;
            if (targetX < 10) targetX = 10;
            if (targetX + ttRect.width > containerRect.width - 10) targetX = containerRect.width - ttRect.width - 10;

            elements.tooltip.style.left = `${targetX}px`;
            elements.tooltip.style.top = `${targetY}px`;
        };

        const hideTooltip = () => elements.tooltip.classList.remove('active');

        const playAudioAndFlash = (e) => {
            e.preventDefault(); 
            poly.classList.add('clicked-flash');
            setTimeout(() => poly.classList.remove('clicked-flash'), 300);

            let audioSrc = "";
            if (typeof item.audio === 'string') audioSrc = item.audio; 
            else if (typeof item.audio === 'object') audioSrc = item.audio[currentVoiceRole]; 

            if (audioSrc) {
                if (!audioCache[audioSrc]) audioCache[audioSrc] = new Audio(audioSrc);
                if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
                currentAudio = audioCache[audioSrc];
                currentAudio.play().catch(e => console.log('请先交互解锁音频', e));
            }
        };

        poly.addEventListener('mouseenter', showTooltip);
        poly.addEventListener('mouseleave', hideTooltip);
        poly.addEventListener('touchstart', (e) => { showTooltip(); playAudioAndFlash(e); });
        poly.addEventListener('click', playAudioAndFlash);
    }

    elements.prevBtn.addEventListener('click', () => { if(currentPageIdx > 0) renderPage(currentPageIdx - 1); });
    elements.nextBtn.addEventListener('click', () => { if(currentPageIdx < pageList.length - 1) renderPage(currentPageIdx + 1); });

    if (pageList.length > 0) renderPage(0);

</script>
